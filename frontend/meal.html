<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <section>
        <div>
            <div>
                <div>
                    <h1>Your Weekly Meal Plan</h1>
                    <p>Budget:
                        <span>#0</span>
                        Daily Budget:
                        <span>0#</span>
                    </p>
                </div>
                <button>Download plan</button>
            </div>
                <div class="days" id="daysContainer">
                </div>
                    <div id="mealContent">
                    </div>
        </div>
        <div class="sidebar">
            <div class="card">
                <h2>Budget summary</h2>
                <div class="summary-items">
                    <span>Weekly Allowance</span>
                    <strong id="summaryWeekly">#0</strong>
                </div>
                <div class="summary-items">
                    <span>Daily Budget</span>
                    <strong id="summaryDaily">#0</strong>
                </div>
                <div class="summary-items">
                    <span>Total Planned</span>
                    <strong id="summaryPlanned">#0</strong>
                </div>
                <div class="summary-items green">
                    <span>Remaining</span>
                    <strong id="summaryRemaining">#0</strong>
                </div>
            </div>
            <div class="card">
                <h2>Top Affordable Foods</h2>
                <div class="food-items">
                    <span>Bread & Egg</span>
                    <strong>#250</strong>
                </div>
                <div class="food-items">
                    <span>Garri & Groundnut</span>
                    <strong>#200</strong>
                </div>
                <div class="food-items">
                    <span>Custard & Akara</span>
                    <strong>#500</strong>
                </div>
                <div class="food-items">
                    <span>Indomie</span>
                    <strong>#400</strong>
                </div>
                <div class="food-items">
                    <span>Rice & Stew</span>
                    <strong>#1500</strong>
                </div>
                <div class="food-items">
                    <span>Krislaw</span>
                    <strong>#2000</strong>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
